{% extends "base.html" %}
{% block title %}Home · OMNIX{% endblock %}
{% block content %}
<h1>Welcome, {{ username }}</h1>

{% if pin_pending %}
<!-- PIN lock pop-up over the home layout (per spec) -->
<section class="pin-overlay" data-testid="pin-lock-overlay">
  <div class="pin-card">
    <h2>2FA required</h2>
    <p class="muted">Enter your 6-digit PIN. Session locks in <span id="pin-timer" data-testid="pin-timer">--:--</span>.</p>
    <form id="pin-form" data-testid="pin-form" autocomplete="off">
      <input name="pin" data-testid="pin-input" required pattern="[0-9]{6}" maxlength="6" inputmode="numeric" autofocus />
      <button type="submit" data-testid="pin-submit-button">Unlock</button>
    </form>
    <p class="err" id="pin-error" data-testid="pin-error"></p>
  </div>
</section>
<script>
const deadline = {{ pin_deadline | int }};
function tick() {
  const remaining = Math.max(0, deadline - Math.floor(Date.now() / 1000));
  const m = String(Math.floor(remaining / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  const t = document.getElementById('pin-timer'); if (t) t.textContent = `${m}:${s}`;
  if (remaining <= 0) {
    const e = document.getElementById('pin-error');
    if (e) e.textContent = 'PIN deadline expired. Logging out...';
    window.api('/api/auth/logout', 'POST').finally(() => location.href = '/api/pages/login');
  }
}
tick();
const timer = setInterval(tick, 1000);
document.getElementById('pin-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = new FormData(e.target);
  const out = await window.api('/api/auth/verify-pin', 'POST', { pin: f.get('pin') });
  const errEl = document.getElementById('pin-error');
  if (!out.ok) {
    errEl.textContent = out.detail || 'Invalid PIN';
    if (out.status === 423 || out.status === 440) {
      setTimeout(() => location.href = '/api/pages/login', 1500);
    }
    return;
  }
  clearInterval(timer);
  location.reload();
});
</script>
{% endif %}

<section class="stories-strip" data-testid="stories-strip">
  <h2>Stories <small class="muted">(24h)</small></h2>
  <form id="story-form" enctype="multipart/form-data" class="inline-form">
    <input type="file" name="image" accept="image/*" data-testid="story-file" required />
    <button type="submit" data-testid="story-upload-button">Upload Story</button>
  </form>
  <div id="stories-list" class="row" data-testid="stories-list"></div>
</section>

<section class="post-composer">
  <h2>Create a post</h2>
  <form id="post-form" enctype="multipart/form-data">
    <input type="file" name="image" accept="image/*" data-testid="post-file" required />
    <textarea name="caption" data-testid="post-caption" placeholder="Caption (optional)" maxlength="500"></textarea>
    <button type="submit" data-testid="post-submit-button">Post</button>
    <p class="err" id="post-error" data-testid="post-error"></p>
  </form>
</section>

<section class="feed" data-testid="feed">
  <h2>Feed</h2>
  <div id="feed-list"></div>
</section>

<script>
if (!{{ 'true' if pin_pending else 'false' }}) {
  // Load feed + stories only when PIN gate cleared
  window.loadFeedAndStories();
}
document.getElementById('post-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const out = await window.apiUpload('/api/posts', new FormData(e.target));
  const errEl = document.getElementById('post-error');
  if (!out.ok) { errEl.textContent = out.detail || 'Post failed'; return; }
  errEl.textContent = ''; e.target.reset();
  window.loadFeedAndStories();
});
document.getElementById('story-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const out = await window.apiUpload('/api/stories', new FormData(e.target));
  if (out.ok) { e.target.reset(); window.loadFeedAndStories(); }
});
</script>
{% endblock %}
