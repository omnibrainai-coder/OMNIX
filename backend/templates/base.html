<!DOCTYPE html>
<html lang="en">

  <title>{% block title %}OMNIX{% endblock %}</title>
  <link rel="stylesheet" href="/api/static/css/styles.css">
</head>
<body>

    <a href="/api/pages/home" class="brand">OMNIX</a>

      <a href="/api/pages/chat">Chat</a>

  <script src="/api/static/js/app.js"></script>

</html>
