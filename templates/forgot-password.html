<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OMNIX — Reset password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --bg-card: #0a0a0a;
      --bg-glass: rgba(255,255,255,0.03);
      --bg-glass-hover: rgba(255,255,255,0.05);
      --accent: #007BFF;
      --accent-hover: #3390ff;
      --accent-glow: rgba(0,123,255,0.25);
      --accent-glow-strong: rgba(0,123,255,0.4);
      --text-primary: #ffffff;
      --text-secondary: #8a8a8a;
      --text-muted: #5a5a5a;
      --text-error: #ff4444;
      --text-success: #34d399;
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(0,123,255,0.5);
      --border-error: rgba(255,68,68,0.5);
      --radius: 14px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: 0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      overflow-x: hidden;
      position: relative;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,123,255,0.05) 0%, transparent 70%);
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      animation: float 8s ease-in-out infinite;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,123,255,0.03) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header__back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 20px;
      transition: color var(--transition-fast);
    }
    .header__back:hover { color: var(--text-secondary); }
    .header__back svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .header__title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .header__subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-glass);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .card:hover {
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .field {
      position: relative;
      margin-bottom: 24px;
    }
    .field__input {
      width: 100%;
      height: 56px;
      padding: 24px 16px 8px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all var(--transition-fast);
      -webkit-appearance: none;
    }
    .field__input::placeholder { color: transparent; }
    .field__input:focus {
      border-color: var(--border-focus);
      background: var(--bg-glass-hover);
      box-shadow: 0 0 0 3px rgba(0,123,255,0.1), 0 0 20px rgba(0,123,255,0.08);
    }
    .field__input.error {
      border-color: var(--border-error);
      box-shadow: 0 0 0 3px rgba(255,68,68,0.1);
    }
    .field__label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
      pointer-events: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: left center;
    }
    .field__input:focus + .field__label,
    .field__input:not(:placeholder-shown) + .field__label {
      top: 14px;
      transform: translateY(0) scale(0.75);
      color: var(--accent);
      font-weight: 500;
    }
    .field__input:not(:placeholder-shown) + .field__label {
      color: var(--text-secondary);
    }
    .field__input:focus:not(.error) + .field__label {
      color: var(--accent);
    }
    .field__input.error + .field__label,
    .field__input.error:focus + .field__label {
      color: var(--text-error);
    }
    .field__hint {
      font-size: 0.72rem;
      color: var(--text-error);
      margin-top: 4px;
      margin-left: 4px;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 0.2s ease;
      position: absolute;
      bottom: -18px;
      left: 0;
    }
    .field__hint.show { opacity: 1; transform: translateY(0); }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-fast);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn--primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn--primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow-strong);
    }
    .btn--primary:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .btn--primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn--primary .btn__spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0);
      animation: ripple 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    .text-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: color var(--transition-fast);
    }
    .text-link:hover { color: var(--accent); }
    .text-link--accent { color: var(--accent); font-weight: 600; }
    .text-link--accent:hover { color: var(--accent-hover); }
    .text-center { text-align: center; }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      color: var(--text-muted);
      font-size: 0.75rem;
      line-height: 1.6;
    }
    .footer-text a { color: var(--text-secondary); text-decoration: none; transition: color var(--transition-fast); }
    .footer-text a:hover { color: var(--accent); }

    .success-state {
      text-align: center;
      padding: 16px 0;
      animation: fadeIn 0.5s ease both;
    }
    .success-state__icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(52,211,153,0.12);
      border: 2px solid rgba(52,211,153,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .success-state__icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--text-success);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .success-state__title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .success-state__desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--border-error); color: var(--text-error); }
    .toast.success { border-color: rgba(52,211,153,0.3); color: var(--text-success); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.4s ease-in-out; }

    @media (max-width: 380px) {
      .card { padding: 24px; }
      .header { margin-bottom: 32px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="noise"></div>

  <div class="container">
    <div class="header">
      <a href="/" class="header__back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to sign in
      </a>
      <div class="header__title">Reset password</div>
      <div class="header__subtitle">Enter your email address and we'll send you a link to get back into your account.</div>
    </div>

    <div class="card" id="formCard">
      <div class="field">
        <input class="field__input" type="email" id="email" placeholder=" " autocomplete="email">
        <label class="field__label" for="email">Email address</label>
        <div class="field__hint" id="emailHint"></div>
      </div>

      <button class="btn btn--primary" id="sendBtn" onclick="handleSend()">
        <span class="btn__text">Send reset link</span>
      </button>
    </div>

    <div class="footer-text">
      Remember your password? <a href="/" class="text-link text-link--accent">Sign in</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://0ec90b57d6e95fcbda19832f.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJib2x0IiwicmVmIjoiMGVjOTBiNTdkNmU5NWZjYmRhMTk4MzJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg4ODE1NzQsImV4cCI6MTc1ODg4MTU3NH0.9I8-U0x86Ak8t2DGaIk0HfvTSLsAyzdnz-Nw00mMkKw';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' ' + type : '');
      setTimeout(function() { t.className = 'toast'; }, 3000);
    }

    function createRipple(e) {
      const btn = e.currentTarget;
      const ripple = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      ripple.className = 'ripple';
      btn.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 500);
    }
    document.querySelectorAll('.btn').forEach(function(b) { b.addEventListener('click', createRipple); });

    function setError(fieldId, hintId, msg) {
      const field = document.getElementById(fieldId);
      const hint = document.getElementById(hintId);
      field.classList.add('error');
      hint.textContent = msg;
      hint.classList.add('show');
      field.closest('.field').classList.add('shake');
      setTimeout(function() { field.closest('.field').classList.remove('shake'); }, 400);
      field.addEventListener('input', function() {
        field.classList.remove('error');
        hint.classList.remove('show');
      }, { once: true });
    }

    function setLoading(btn, loading) {
      const text = btn.querySelector('.btn__text');
      if (loading) {
        btn.disabled = true;
        if (text) text.innerHTML = '<span class="btn__spinner"></span>';
      } else {
        btn.disabled = false;
        if (text) text.textContent = 'Send reset link';
      }
    }

    function showSuccessState(email) {
      const card = document.getElementById('formCard');
      card.innerHTML = '<div class="success-state">' +
        '<div class="success-state__icon">' +
          '<svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>' +
        '</div>' +
        '<div class="success-state__title">Check your email</div>' +
        '<div class="success-state__desc">We sent a password reset link to <strong>' + email + '</strong>. Click the link in the email to reset your password.</div>' +
        '<button class="btn btn--primary" onclick="window.location=\'/\'">Back to sign in</button>' +
      '</div>';
    }

    async function handleSend() {
      const email = document.getElementById('email');
      const btn = document.getElementById('sendBtn');

      if (!email.value.trim()) {
        setError('email', 'emailHint', 'Please enter your email address');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim())) {
        setError('email', 'emailHint', 'Please enter a valid email address');
        return;
      }

      setLoading(btn, true);
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email.value.trim(), {
          redirectTo: window.location.origin + '/reset-password'
        });
        if (error) throw error;

        showSuccessState(email.value.trim());
      } catch (err) {
        setLoading(btn, false);
        showToast(err.message || 'Failed to send reset link', 'error');
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.activeElement.id === 'email') {
        handleSend();
      }
    });
  </script>
</body>
</html>
