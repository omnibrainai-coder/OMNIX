<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SHADOW — Create</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .type-tabs {
      display: flex;
      gap: 0;
      margin: 0 16px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 4px;
    }

    .type-tab {
      flex: 1;
      padding: 9px 8px;
      border-radius: calc(var(--radius-md) - 3px);
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
    }

    .type-tab.active {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--border-active);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    .upload-zone {
      margin: 0 16px 14px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      aspect-ratio: 1;
      max-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      background: var(--bg-card);
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover {
      border-color: var(--border-active);
      background: var(--accent-dim);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 44px; height: 44px;
      color: var(--text-muted);
    }

    .upload-text {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-align: center;
    }

    .upload-hint {
      font-size: 0.62rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .media-actions {
      display: flex;
      gap: 8px;
      margin: 0 16px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .media-actions::-webkit-scrollbar { display: none; }

    .media-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .media-btn svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .media-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .caption-area {
      padding: 0 16px 14px;
    }

    .tag-input-wrap {
      position: relative;
      padding: 0 16px 14px;
    }

    .hashtag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 14px;
    }

    .hashtag-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--accent-dim);
      border: 1px solid var(--border-active);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    .hashtag-chip:hover { background: rgba(0,212,255,0.25); }

    .audience-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .audience-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    .audience-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
    }

    .post-btn-row {
      padding: 0 16px 16px;
      display: flex;
      gap: 10px;
    }

    .post-btn-row .btn { margin-top: 0; }
  </style>
</head>
<body>
  <div class="page">
    <div class="scan-overlay"></div>

    <header class="header">
      <div class="header__title">// CREATE</div>
      <div class="header__actions">
        <button class="btn btn--ghost btn--icon" style="width:auto;padding:0 14px;height:36px;font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.1em;" onclick="showToast('DRAFT SAVED')">DRAFT</button>
      </div>
    </header>

    <!-- Post type tabs -->
    <div style="padding:14px 16px 8px;">
      <div class="type-tabs">
        <button class="type-tab active" onclick="setType(this)">POST</button>
        <button class="type-tab" onclick="setType(this)">STORY</button>
        <button class="type-tab" onclick="setType(this)">REEL</button>
        <button class="type-tab" onclick="setType(this)">LIVE</button>
      </div>
    </div>

    <!-- Upload zone -->
    <div class="upload-zone">
      <input type="file" accept="image/*,video/*" onchange="handleUpload(this)">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <div class="upload-text">TAP TO UPLOAD MEDIA</div>
      <div class="upload-hint">JPG, PNG, MP4, MOV · Max 100MB</div>
    </div>

    <!-- Quick media tools -->
    <div class="media-actions">
      <button class="media-btn">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        GALLERY
      </button>
      <button class="media-btn">
        <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        VIDEO
      </button>
      <button class="media-btn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        GIF
      </button>
      <button class="media-btn">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        AUDIO
      </button>
    </div>

    <!-- Caption input -->
    <div class="caption-area">
      <div class="input-group">
        <label>Caption</label>
        <textarea class="input" placeholder="What's on your mind? Use # for tags..." maxlength="2200" rows="4"></textarea>
      </div>
    </div>

    <!-- Hashtag suggestions -->
    <div class="section-header">
      <span class="section-title">// Suggested Tags</span>
    </div>
    <div class="hashtag-row">
      <div class="hashtag-chip">#ShadowNet</div>
      <div class="hashtag-chip">#OMNIX</div>
      <div class="hashtag-chip">#CipherGrid</div>
      <div class="hashtag-chip">#DarkNet</div>
      <div class="hashtag-chip">#Encrypted</div>
    </div>

    <!-- Audience selector -->
    <div class="audience-row">
      <span class="audience-label">// AUDIENCE</span>
      <select class="audience-select">
        <option>ALL NODES</option>
        <option>FOLLOWERS ONLY</option>
        <option>CLOSE NODES</option>
        <option>ONLY ME</option>
      </select>
    </div>

    <!-- Publish buttons -->
    <div class="post-btn-row">
      <button class="btn btn--outline" style="flex:1;" onclick="showToast('SCHEDULED')">SCHEDULE</button>
      <button class="btn btn--primary" style="flex:2;" onclick="showToast('TRANSMITTING...')">
        TRANSMIT NOW
      </button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/home" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="/search" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </a>
    <a href="/create" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Create</span>
    </a>
    <a href="/chat" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </a>
    <a href="/profile" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="/static/app.js"></script>
  <script>
    function setType(btn) {
      document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    function handleUpload(input) {
      if (input.files && input.files[0]) {
        showToast('MEDIA LOADED: ' + input.files[0].name.toUpperCase());
      }
    }
  </script>
</body>
</html>
