<!DOCTYPE html>
<html>
<head>
<title>SHADOW HOME</title>

<style>

body{
margin:0;
background:#080808;
font-family:Arial;
color:white;
padding-bottom:90px;
}

.header{
padding:20px;
font-size:34px;
font-weight:bold;
text-align:center;
background:#111;
border-bottom:1px solid #222;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#181818;
color:white;
font-size:16px;
}

.stories{
display:flex;
gap:15px;
overflow-x:auto;
padding:15px;
}

.story{
min-width:85px;
height:85px;
border-radius:50%;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

.post{
margin:15px;
background:#111;
border-radius:20px;
padding:15px;
}

.postbox{
height:220px;
background:#202020;
border-radius:15px;
margin-top:10px;
}

.profile{
margin:15px;
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
margin:auto;
}

.username{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.score{
color:#b06cff;
margin-top:8px;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
display:flex;
justify-content:space-around;
padding:18px;
border-top:1px solid #222;
}

.bottomnav a{
color:white;
text-decoration:none;
font-size:28px;
}

</style>

</head>

<body>

<div class="header">
SHADOW
</div>

<div class="search">
<input placeholder="Search SHADOW">
</div>

<div class="stories">
<div class="story">A</div>
<div class="story">B</div>
<div class="story">C</div>
<div class="story">D</div>
<div class="story">E</div>
</div>

<div class="post">
<h3>Affan</h3>
<p>Welcome to SHADOW 🚀</p>
<div class="postbox"></div>
</div>

<div class="post">
<h3>OMNI.X</h3>
<p>First Premium Feed</p>
<div class="postbox"></div>
</div>

<div class="profile">
<div class="avatar"></div>
<div class="username">Affan</div>
<div class="score">OMNI Score : 9.3 / 10</div>
</div>

<div class="bottomnav">
<a href="/home">🏠</a>
<a href="/search">🔍</a>
<a href="/create">➕</a>
<a href="/chat">💬</a>
<a href="/profile">👤</a>
</div>

</body>
</html>
