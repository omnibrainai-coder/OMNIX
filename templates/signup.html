<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SHADOW — Create Account</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 32px 20px 40px;
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .orb--1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,212,255,0.09) 0%, transparent 70%);
      top: -60px; right: -60px;
      animation: pulse-glow 4.5s ease-in-out infinite;
    }

    .signup-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.45s ease both;
    }

    .signup-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .step-dot {
      width: 28px; height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background var(--transition);
    }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    .step-dot.done   { background: var(--accent2); }

    .signup-card {
      background: rgba(13,20,32,0.65);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 24px 24px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: var(--shadow-deep);
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 18px;
      text-align: center;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .login-link {
      text-align: center;
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .login-link a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--transition);
    }

    .login-link a:hover { color: var(--text-primary); }

    .terms-note {
      text-align: center;
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    .terms-note a { color: var(--accent); text-decoration: none; }

    .footer-note {
      margin-top: 24px;
      text-align: center;
    }
    .powered {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
    }
    .omni-brand {
      font-family: var(--font-mono);
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-shadow: 0 0 14px var(--accent-glow);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="scan-overlay"></div>
  <div class="orb orb--1"></div>

  <div class="signup-wrap">
    <div class="signup-header">
      <div class="brand" style="font-size:2.2rem;">SHADOW</div>
      <div class="brand-sub" style="margin-top:4px;">Join the Network</div>
    </div>

    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>

    <div class="signup-card">
      <div class="section-label">// New Node Registration</div>

      <div class="row-2">
        <div class="input-group">
          <label>First Name</label>
          <input class="input" type="text" placeholder="First" autocomplete="given-name">
        </div>
        <div class="input-group">
          <label>Last Name</label>
          <input class="input" type="text" placeholder="Last" autocomplete="family-name">
        </div>
      </div>

      <div class="input-group">
        <label>Username</label>
        <input class="input" type="text" placeholder="@handle" autocomplete="username">
      </div>

      <div class="input-group">
        <label>Mobile Number</label>
        <input class="input" type="tel" placeholder="+1 (000) 000-0000" autocomplete="tel">
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input class="input" type="email" placeholder="you@domain.com" autocomplete="email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input class="input" type="password" placeholder="Min 8 characters" autocomplete="new-password">
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input class="input" type="password" placeholder="Repeat password" autocomplete="new-password">
      </div>

      <button class="btn btn--primary" style="margin-top:6px;" onclick="handleSignup()">
        CREATE ACCOUNT
      </button>

      <div class="login-link">
        Already have an account? <a href="/">Sign in</a>
      </div>

      <div class="terms-note">
        By creating an account you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
      </div>
    </div>

    <div class="footer-note">
      <div class="powered">Powered by</div>
      <div class="omni-brand">OMNI.X</div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    async function handleSignup() {
      const inputs = document.querySelectorAll('.input');
      let valid = true;
      inputs.forEach(function(input) {
        if (!input.value.trim()) {
          valid = false;
          input.style.borderColor = 'var(--error)';
          setTimeout(function() { input.style.borderColor = ''; }, 2000);
        }
      });
      if (!valid) {
        showToast('ALL FIELDS REQUIRED');
        return;
      }
      const passwords = document.querySelectorAll('input[type="password"]');
      if (passwords[0].value !== passwords[1].value) {
        showToast('PASSWORDS DO NOT MATCH');
        passwords[1].style.borderColor = 'var(--error)';
        setTimeout(function() { passwords[1].style.borderColor = ''; }, 2000);
        return;
      }
      if (passwords[0].value.length < 8) {
        showToast('PASSWORD MUST BE 8+ CHARACTERS');
        return;
      }
      showToast('CREATING NODE...');
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            first_name: inputs[0].value.trim(),
            last_name: inputs[1].value.trim(),
            username: inputs[2].value.trim().replace('@', ''),
            mobile: inputs[3].value.trim(),
            email: inputs[4].value.trim(),
            password: passwords[0].value
          })
        });
        const data = await res.json();
        if (data.success) {
          showToast('NODE CREATED');
          setTimeout(function() { window.location = '/'; }, 1000);
        } else {
          showToast(data.detail || 'REGISTRATION FAILED');
        }
      } catch (err) {
        showToast('CONNECTION ERROR');
      }
    }
  </script>
</body>
</html>
