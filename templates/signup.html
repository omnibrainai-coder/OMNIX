<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX — Join Network</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }
        .luxury-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            text-align: center;
        }
        h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 28px;
            color: #f3f4f6;
            letter-spacing: -0.5px;
        }
        .input-container {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.4);
        }
        button {
            width: 100%;
            padding: 16px;
            background: #1d4ed8;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover {
            background: #2563eb;
        }
        .footer-links {
            margin-top: 32px;
            font-size: 12px;
            color: #9ca3af;
            line-height: 1.6;
        }
        .footer-links a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="luxury-card">
    <h2>What's your mobile number?</h2>
    <form action="/send-otp" method="POST">
        <div class="input-container">
            <input type="tel" name="mobile" placeholder="Enter your number" required autocomplete="off">
        </div>
        <button type="submit">Send OTP</button>
    </form>
    
    <div class="footer-links">
        By continuing, you agree to our <br>
        <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>
    </div>
</div>

</body>
</html>
