<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fffef5 0%, #fff2f6 40%, #ebf8ff 70%, #ffffff 100%);
        }
        .luxury-transparent {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-gray-800 antialiased p-4">

    <div></div>

    <main class="w-full flex flex-col items-center justify-center my-auto">
        <div class="text-center mb-4">
            <span class="text-xl font-bold tracking-widest text-black">OMNIX</span>
        </div>

        <div class="w-full max-w-[300px] luxury-transparent rounded-2xl p-5">
            <form id="loginForm" class="space-y-3">
                <input type="text" id="identity" required placeholder="Username, email, or phone" 
                    class="w-full bg-white/90 border border-gray-200 rounded-xl px-3 py-2 text-xs text-black focus:outline-none focus:border-blue-400">
                
                <input type="password" id="password" required placeholder="Password" 
                    class="w-full bg-white/90 border border-gray-200 rounded-xl px-3 py-2 text-xs text-black focus:outline-none focus:border-blue-400">

                <button type="submit" class="w-full bg-black text-white font-medium rounded-xl py-2 text-xs hover:bg-gray-800 active:scale-[0.99] transition-all cursor-pointer">
                    Log In
                </button>

                <div class="relative flex py-0.5 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-2 text-[9px] text-gray-400 uppercase">or</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <button type="button" onclick="window.location.href='/api/auth/google'" class="w-full bg-white border border-gray-200 text-gray-700 font-medium rounded-xl py-2 text-xs flex items-center justify-center gap-2 hover:bg-gray-50 active:scale-[0.99] transition-all cursor-pointer shadow-sm">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.61c-.29 1.53-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.65-5.17 3.65-8.58z"/>
                        <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-3.05c-1.08.72-2.45 1.16-4.05 1.16-3.11 0-5.74-2.11-6.68-4.96H1.21v3.15C3.18 21.88 7.31 24 12 24z"/>
                        <path fill="#FBBC05" d="M5.32 14.24A7.16 7.16 0 0 1 5 12c0-.79.13-1.57.32-2.34V6.51H1.21A11.94 11.94 0 0 0 0 12c0 1.92.45 3.74 1.21 5.39l4.11-3.15z"/>
                        <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.18 2.12 1.21 5.39l4.11 3.15c.94-2.85 3.57-4.96 6.68-4.96z"/>
                    </svg>
                    Continue with Google
                </button>
            </form>

            <div class="mt-3.5 flex justify-between items-center text-[10px]">
                <a href="/forgot-password" class="text-blue-600 hover:underline">Forgot password?</a>
                <a href="/signup" class="text-blue-600 font-medium hover:underline">Sign up</a>
            </div>

            <div id="errorMessage" class="mt-2 text-center text-[10px] text-red-500 font-medium hidden"></div>
        </div>
    </main>

    <footer class="w-full max-w-xs mx-auto text-center space-y-1 text-[9px] text-gray-400 pb-2">
        <div class="flex justify-center space-x-3 text-gray-400">
            <a href="/terms" class="hover:text-gray-600">Terms of Service</a>
            <a href="/privacy" class="hover:text-gray-600">Privacy Policy</a>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identity = document.getElementById('identity').value;
            const password = document.getElementById('password').value;
            const errDiv = document.getElementById('errorMessage');
            errDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identity, password })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('access_token', data.access_token);
                    window.location.href = '/home';
                } else {
                    errDiv.innerText = data.message || "Invalid credentials";
                    errDiv.classList.remove('hidden');
                }
            } catch (err) {
                errDiv.innerText = "Connection error. Please try again.";
                errDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
