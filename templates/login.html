<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SHADOW — Enter</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
      overflow: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .orb--1 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(0,212,255,0.10) 0%, transparent 70%);
      top: -100px; left: -80px;
      animation: pulse-glow 4s ease-in-out infinite;
    }
    .orb--2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,255,157,0.07) 0%, transparent 70%);
      bottom: 60px; right: -60px;
      animation: pulse-glow 5.5s ease-in-out infinite reverse;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.5s ease both;
    }

    .brand-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand { font-size: 3.2rem; margin-bottom: 4px; }

    .status-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 10px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse-glow 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    .login-card {
      width: 100%;
      background: rgba(13,20,32,0.65);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 24px 24px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 60px rgba(0,212,255,0.06), var(--shadow-deep);
    }

    .login-title {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: center;
    }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
    }
    .divider-text::before, .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .link-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 14px;
    }
    .link-row a {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color var(--transition);
    }
    .link-row a:hover { color: var(--accent); }

    .footer-note {
      margin-top: 24px;
      text-align: center;
    }
    .powered {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .omni-brand {
      font-family: var(--font-mono);
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-shadow: 0 0 14px var(--accent-glow);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="scan-overlay"></div>
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>

  <div class="login-wrap">
    <div class="brand-area">
      <div class="brand anim-flicker">SHADOW</div>
      <div class="brand-sub">Private Social Network</div>
      <div class="status-line">
        <div class="status-dot"></div>
        <span>SYSTEM ONLINE</span>
      </div>
    </div>

    <div class="login-card">
      <div class="login-title">// AUTHENTICATE</div>

      <div class="input-group">
        <label>Identity</label>
        <input class="input" type="text" placeholder="Mobile / Username / Email" autocomplete="username">
      </div>

      <div class="input-group">
        <label>Passkey</label>
        <input class="input" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>

      <div class="link-row">
        <span></span>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn btn--primary" onclick="showToast('AUTHENTICATING...')">
        ENTER SHADOW
      </button>

      <div class="divider-text">or</div>

      <a href="/signup" class="btn btn--outline" style="text-decoration:none;">
        CREATE NEW ACCOUNT
      </a>

      <div style="text-align:center; margin-top:14px;">
        <a href="#" style="font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);text-decoration:none;letter-spacing:0.08em; margin:0 8px;">Terms</a>
        <span style="color:var(--text-muted);">·</span>
        <a href="#" style="font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);text-decoration:none;letter-spacing:0.08em; margin:0 8px;">Privacy</a>
      </div>
    </div>

    <div class="footer-note">
      <div class="powered">Powered by</div>
      <div class="omni-brand">OMNI.X</div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
