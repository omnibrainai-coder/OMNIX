<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SHADOW — Profile</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .profile-banner {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, #021a22 0%, #003a4a 50%, #000a0d 100%);
      position: relative;
      overflow: hidden;
    }

    .profile-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .profile-banner__edit {
      position: absolute;
      bottom: 10px; right: 12px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid rgba(0,212,255,0.4);
      background: rgba(3,5,8,0.6);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background var(--transition);
    }

    .profile-banner__edit:hover { background: var(--accent-dim); }

    .profile-avatar-area {
      padding: 0 20px;
      margin-top: -44px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .profile-avatar-border {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 3px solid var(--bg-base);
      background: linear-gradient(135deg, #004d60, #00d4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 700;
      color: #000;
      position: relative;
    }

    .profile-avatar-border::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent));
      z-index: -1;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .edit-profile-btn {
      padding: 8px 18px;
      border-radius: 100px;
      border: 1px solid var(--border-active);
      background: transparent;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 4px;
    }
    .edit-profile-btn:hover { background: var(--accent-dim); }

    .profile-info { padding: 12px 20px 0; }

    .profile-name {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-primary);
    }

    .profile-handle {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .profile-bio {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-top: 8px;
    }

    .omni-score-card {
      margin: 14px 16px 0;
      background: var(--bg-card);
      border: 1px solid var(--border-active);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-glow);
    }

    .omni-score-label {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .omni-score-value {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      color: var(--accent);
      text-shadow: 0 0 16px var(--accent-glow);
      letter-spacing: 0.05em;
    }

    .omni-score-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .omni-score-fill {
      height: 100%;
      width: 93%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      box-shadow: 0 0 10px var(--accent-glow);
      animation: scoreLoad 1.2s ease both;
    }

    @keyframes scoreLoad {
      from { width: 0; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin: 14px 16px 0;
    }

    .stat-cell {
      background: var(--bg-card);
      padding: 12px 6px;
      text-align: center;
    }

    .stat-cell__val {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      color: var(--text-primary);
    }

    .stat-cell__lbl {
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Profile tabs */
    .profile-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: 14px 0 0;
    }

    .profile-tab {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      transition: color var(--transition);
    }

    .profile-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 32px; height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      border-radius: 2px 2px 0 0;
      transition: transform var(--transition);
    }

    .profile-tab.active { color: var(--accent); }
    .profile-tab.active::after { transform: translateX(-50%) scaleX(1); }

    /* Post grid */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 2px;
    }

    .post-thumb {
      aspect-ratio: 1;
      background: var(--bg-card);
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .post-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .post-thumb:hover img { transform: scale(1.06); }

    .post-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(3,5,8,0.6));
      opacity: 0;
      transition: opacity var(--transition);
    }

    .post-thumb:hover::after { opacity: 1; }
  </style>
</head>
<body>
  <div class="page">
    <div class="scan-overlay"></div>

    <header class="header">
      <div class="header__title">// PROFILE</div>
      <div class="header__actions">
        <button class="btn btn--ghost btn--icon" style="width:36px;height:36px;" onclick="showToast('OPTIONS')">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Banner -->
    <div class="profile-banner">
      <button class="profile-banner__edit" onclick="showToast('EDIT BANNER')">EDIT BANNER</button>
    </div>

    <!-- Avatar + Edit button row -->
    <div class="profile-avatar-area">
      <div class="profile-avatar-border">A</div>
      <button class="edit-profile-btn" onclick="showToast('EDIT PROFILE')">EDIT NODE</button>
    </div>

    <!-- Info -->
    <div class="profile-info">
      <div class="profile-name">Affan</div>
      <div class="profile-handle">@affan · NODE-42</div>
      <p class="profile-bio">Building the future in the dark. SHADOW early adopter. OMNI.X contributor. Encrypted by default.</p>
    </div>

    <!-- OMNI Score -->
    <div class="omni-score-card">
      <div>
        <div class="omni-score-label">OMNI Score</div>
        <div class="omni-score-bar" style="width:140px;margin-top:8px;">
          <div class="omni-score-fill"></div>
        </div>
      </div>
      <div class="omni-score-value">9.3</div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-cell__val">248</div>
        <div class="stat-cell__lbl">Posts</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell__val">4.2K</div>
        <div class="stat-cell__lbl">Followers</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell__val">312</div>
        <div class="stat-cell__lbl">Following</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell__val">14</div>
        <div class="stat-cell__lbl">Streak</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="profile-tabs">
      <button class="profile-tab active" onclick="setTab(this)">FEED</button>
      <button class="profile-tab" onclick="setTab(this)">MEDIA</button>
      <button class="profile-tab" onclick="setTab(this)">SAVED</button>
      <button class="profile-tab" onclick="setTab(this)">TAGGED</button>
    </div>

    <!-- Photo grid -->
    <div class="post-grid" id="postGrid">
      <div class="post-thumb"><img src="https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/2007647/pexels-photo-2007647.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/1089438/pexels-photo-1089438.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/1714208/pexels-photo-1714208.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/373543/pexels-photo-373543.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/1181298/pexels-photo-1181298.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/2004161/pexels-photo-2004161.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/546819/pexels-photo-546819.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
      <div class="post-thumb"><img src="https://images.pexels.com/photos/1181359/pexels-photo-1181359.jpeg?auto=compress&cs=tinysrgb&w=300" alt="" loading="lazy"></div>
    </div>

    <div style="height:20px;"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/home" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="/search" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </a>
    <a href="/create" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Create</span>
    </a>
    <a href="/chat" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </a>
    <a href="/profile" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="/static/app.js"></script>
  <script>
    function setTab(btn) {
      document.querySelectorAll('.profile-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
