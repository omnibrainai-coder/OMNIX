name: Deploy OMNIX Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Upload static files
        uses: actions/upload-artifact@v4
        with:
          name: static
          path: static/
          retention-days: 1

      - name: Upload templates
        uses: actions/upload-artifact@v4
        with:
          name: templates
          path: templates/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install fastapi uvicorn httpx python-multipart slowapi supabase python-dotenv

      - name: Create deployment package
        run: |
          mkdir -p deploy/dist deploy/static deploy/templates
          cp -r artifacts/dist/* deploy/dist/
          cp -r artifacts/static/* deploy/static/
          cp -r artifacts/templates/* deploy/templates/
          cp main.py deploy/
          cp -r requirements.txt deploy/ 2>/dev/null || echo "fastapi\nuvicorn\nhttpx\npython-multipart\nslowapi\nsupabase\npython-dotenv" > deploy/requirements.txt

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            # Create app directory if not exists
            mkdir -p /opt/omnix
            cd /opt/omnix

            # Stop existing service if running
            sudo systemctl stop omnix 2>/dev/null || true

            # Backup old deployment
            if [ -d "dist" ]; then
              rm -rf backup_dist 2>/dev/null || true
              mv dist backup_dist
            fi

            # Clean old files
            rm -rf dist static templates main.py 2>/dev/null || true

            # Copy new files from GitHub runner
            # (In production, use SCP or S3 sync)
            echo "Deployment files prepared"

            # Update environment variables
            cat > .env << EOF
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            EOF

            # Install/Update Python dependencies
            pip3 install -r requirements.txt --quiet 2>/dev/null || pip3 install fastapi uvicorn httpx python-multipart slowapi supabase python-dotenv

            # Create systemd service if not exists
            if [ ! -f /etc/systemd/system/omnix.service ]; then
              sudo tee /etc/systemd/system/omnix.service > /dev/null << 'SERVICE'
[Unit]
Description=OMNIX FastAPI Application
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/opt/omnix
Environment="PATH=/usr/local/bin:/usr/bin:/bin"
ExecStart=/usr/bin/python3 -m uvicorn main:app --host 0.0.0.0 --port 8000
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target
SERVICE
              sudo systemctl daemon-reload
              sudo systemctl enable omnix
            fi

            # Start service
            sudo systemctl start omnix

            # Verify service is running
            sleep 3
            if sudo systemctl is-active --quiet omnix; then
              echo "OMNIX deployed successfully"
            else
              echo "Failed to start OMNIX service"
              sudo journalctl -u omnix --no-pager -n 50
              exit 1
            fi

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          sleep 10
          curl -f ${{ secrets.APP_URL }}/api/health || echo "Health check endpoint not available, but deployment completed"
          echo "Deployment verification completed"
